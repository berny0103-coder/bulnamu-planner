<html lang="ko">
<head>

<style>
:root { color-scheme: light only; }
@media (prefers-color-scheme: dark) {
  html { filter: none !important; background: #f7f6f2 !important; }
  body { background: #f7f6f2 !important; color: #111110 !important; }
}
:root {
  --bg: #f5f3ed;
  --surface: #ffffff;
  --card: #ffffff;
  --card2: #f0efe9;
  --border: #e0ddd4;
  --border2: #c8c4b8;
  --green: #2d6a3f;
  --green2: #3d8a52;
  --green-light: #e8f2eb;
  --green-glow: rgba(45,106,63,0.08);
  --green-deep: #1a4527;
  --text: #111110;
  --text-dim: #3a3a2e;
  --text-muted: #7a7868;
  --red: #c0402a;
  --amber: #b07820;
  --amber-light: #fdf6e8;
  --shadow: 0 2px 16px rgba(0,0,0,0.06);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.10);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { background: #f7f6f2 !important; }
body {
  background: var(--bg) !important;
  color: var(--text) !important;
  font-family: 'Noto Sans KR', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse 70% 35% at 50% 0%, rgba(45,106,63,0.08) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

.wrap { max-width: 460px; margin: 0 auto; padding: 28px 22px 60px; position: relative; z-index: 1; }

/* SUCCESS HERO */
.hero {
  text-align: center;
  margin-bottom: 32px;
  padding-top: 16px;
}
.hero-check {
  width: 64px; height: 64px;
  background: var(--green);
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 18px;
  box-shadow: 0 8px 24px rgba(45,106,63,0.3);
  animation: popIn 0.5s cubic-bezier(.34,1.56,.64,1);
}
.hero-check svg { width: 32px; height: 32px; stroke: #fff; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
.hero-check svg path { stroke-dasharray: 30; stroke-dashoffset: 30; animation: drawCheck 0.5s 0.3s ease forwards; }
@keyframes popIn { from { transform: scale(0); } to { transform: scale(1); } }
@keyframes drawCheck { to { stroke-dashoffset: 0; } }

.hero-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 32px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 8px;
  line-height: 1.25;
}
.hero-title em { color: var(--green); font-style: italic; }
.hero-sub {
  font-size: 13px;
  color: var(--text-muted);
  line-height: 1.7;
}
.hero-position {
  display: inline-block;
  margin-top: 14px;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--green);
  background: var(--green-light);
  padding: 6px 14px;
  border-radius: 100px;
  letter-spacing: 0.05em;
}

/* PASS-IT-ON CARD (메인) */
.pass {
  background: linear-gradient(165deg, var(--green) 0%, var(--green-deep) 100%);
  border-radius: 24px;
  padding: 28px 24px 24px;
  color: #fff;
  margin-bottom: 22px;
  box-shadow: 0 12px 36px rgba(45,106,63,0.32);
  position: relative;
  overflow: hidden;
}
.pass::before {
  content: '';
  position: absolute;
  top: -50%; right: -30%;
  width: 200px; height: 200px;
  background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 60%);
  pointer-events: none;
}
.pass-label {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.25em;
  opacity: 0.7;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.pass-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 24px;
  font-weight: 600;
  line-height: 1.3;
  margin-bottom: 4px;
}
.pass-title em { font-style: italic; opacity: 0.92; }
.pass-sub {
  font-size: 12px;
  opacity: 0.78;
  margin-bottom: 22px;
  line-height: 1.6;
}

.link-box {
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 12px;
  padding: 12px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;

}
.link-text {
  flex: 1;
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: #fff;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;

}
.link-copy-btn {
  background: rgba(255,255,255,0.95);
  border: none;
  border-radius: 8px;
  padding: 8px 14px;
  font-size: 12px;
  font-weight: 700;
  color: var(--green);
  cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif;
  flex-shrink: 0;

}
.link-copy-btn:hover { background: #fff; transform: translateY(-1px); }
.link-copy-btn.copied { background: var(--amber); color: #fff; }

.share-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 4px;
}
.share-btn {
  background: rgba(255,255,255,0.95);
  border: none;
  border-radius: 12px;
  padding: 13px 8px;
  font-size: 13px;
  font-weight: 700;

  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  transition: all 0.15s;
}
.share-btn:hover { background: #fff; transform: translateY(-1px); }
.share-btn.kakao { background: #fee500; color: #3a2900; }
.share-btn.kakao:hover { background: #ffd900; }

/* MY REFERRAL COUNT */
.my-stats {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 16px 18px;
  margin-bottom: 22px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: var(--shadow);
}
.my-stats-label {
  font-size: 12px;
  color: var(--text-muted);
}
.my-stats-value {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-weight: 600;
  color: var(--green);
}
.my-stats-value em {
  font-style: normal;
  font-size: 13px;
  color: var(--text-muted);
  font-family: 'Noto Sans KR', sans-serif;
  font-weight: 400;
}

/* AUTO IMAGE CARD */
.image-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 22px 20px;
  margin-bottom: 22px;

.image-card-title {

  font-size: 20px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 4px;

}
.image-card-sub {

  position: relative;
  width: 100%;

.img-actions {

}
.img-btn {

  padding: 13px;

  font-weight: 600;

  font-family: 'Noto Sans KR', sans-serif;

}
.img-btn:hover { border-color: var(--green); color: var(--green); }
.img-btn.primary { background: var(--green); color: #fff; border-color: var(--green); }
.img-btn.primary:hover { background: var(--green2); }

/* BUY CTA (전환) */
.buy-cta {
  background: linear-gradient(135deg, #fff8e8 0%, #fdf0c8 100%);

  border-radius: 20px;

}
.buy-tag {
  display: inline-block;
  background: var(--amber);

  font-family: 'DM Mono', monospace;
  font-size: 10px;

  border-radius: 100px;
  margin-bottom: 10px;

}
.buy-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 6px;
  line-height: 1.3;
}
.buy-title em { color: var(--amber); font-style: italic; font-weight: 700; }
.buy-sub {
  font-size: 12px;
  color: var(--text-dim);
  margin-bottom: 16px;
  line-height: 1.6;
}
.buy-btn {
  display: block;
  width: 100%;
  background: var(--text);
  color: #fff;
  border: none;
  border-radius: 12px;
  padding: 15px;
  font-size: 14px;
  font-weight: 700;
  text-align: center;
  text-decoration: none;
  cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif;
  transition: all 0.15s;
}
.buy-btn:hover { transform: translateY(-1px); background: #000; }

/* FOOTER */
.footer {
  text-align: center;
  margin-top: 28px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
  font-size: 11px;

.footer a { color: var(--green); text-decoration: none; }

/* TOAST */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(60px);
  background: var(--text);
  color: #fff;
  padding: 12px 22px;

  font-size: 13px;
  font-weight: 500;
  opacity: 0;
  transition: all 0.3s;
  z-index: 1000;
  box-shadow: 0 8px 24px rgba(0,0,0,0.2);
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* fade animations */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to { opacity: 1; transform: translateY(0); }
}
.fade-up { animation: fadeUp 0.5s ease-out backwards; }
.fade-up-1 { animation-delay: 0.05s; }
.fade-up-2 { animation-delay: 0.18s; }
.fade-up-3 { animation-delay: 0.30s; }
.fade-up-4 { animation-delay: 0.42s; }
.fade-up-5 { animation-delay: 0.54s; }
</style>

<script>
// ── 진입 정보 ──
const myCode = Util.getRefFromURL();
const params = new URLSearchParams(location.search);
const position = parseInt(params.get('pos') || '0', 10);

// 코드 없으면 처음으로
if (!myCode) {
  location.href = '/r.html';
}

// 내 정보 가져오기
const referrer = DataStore.getReferrer(myCode);  // 여기선 "내" 이름이 나옴
const myName = referrer ? referrer.name : '익명';

// 내 추천 링크
const myLink = Util.buildReferralURL(myCode);
document.getElementById('myLink').textContent = myLink;

// 내가 살린 사람 수
function updateRefCount() {
  document.getElementById('refCount').textContent = DataStore.getReferralCount(myCode);
}
updateRefCount();
// 페이지 다시 보일 때 카운트 재계산
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) updateRefCount();
});

// 순번 배지
if (position > 0) {
  document.getElementById('positionBadge').textContent = `${position}번째 참여 · 남은 자리 ${CONFIG.CAPACITY - position}명`;
} else {
  document.getElementById('positionBadge').style.display = 'none';
}

// 구매 링크
document.getElementById('btnBuy').href = CONFIG.STORE_URL_DISCOUNT;

// ── 토스트 ──
const toastEl = document.getElementById('toast');
let toastTimer;
function toast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2400);
}

// ── 복사 ──
document.getElementById('btnCopyLink').addEventListener('click', async (e) => {
  await Util.copyToClipboard(myLink);
  e.target.textContent = '복사됨';
  e.target.classList.add('copied');
  toast('링크가 복사됐어요');
  setTimeout(() => {
    e.target.textContent = '복사';
    e.target.classList.remove('copied');
  }, 2000);
});

// ── 공유 ──
document.getElementById('btnShareKakao').addEventListener('click', async () => {
  const message = Util.buildReferralMessage(myLink);
  await Util.copyToClipboard(message);
  toast('메시지가 복사됐어요. 카톡 채널이 열려요.');
  setTimeout(() => {
    window.open('https://pf.kakao.com/_unexfs', '_blank');
  }, 600);
});

document.getElementById('btnShareSMS').addEventListener('click', async () => {
  const message = Util.buildReferralMessage(myLink);
  // 모바일이면 sms: 스킴
  if (/Mobi|Android|iPhone/i.test(navigator.userAgent)) {
    const sep = /iPhone|iPad/i.test(navigator.userAgent) ? '&' : '?';
    location.href = `sms:${sep}body=${encodeURIComponent(message)}`;
  } else {
    await Util.copyToClipboard(message);
    toast('메시지가 복사됐어요. 문자에 붙여넣으세요.');
  }
});

// ────────────────────────────────────────────
// AUTO IMAGE GENERATOR (Instagram Story 9:16)
// ────────────────────────────────────────────
const canvas = document.getElementById('storyCanvas');
const ctx = canvas.getContext('2d');

function drawStoryImage() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  // 1. 그라데이션 배경 (벌나무 톤 - 녹색 → 깊은 녹색)
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#3d8a52');
  grad.addColorStop(0.55, '#2d6a3f');
  grad.addColorStop(1, '#1a4527');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // 2. 텍스처 노이즈 (살짝)
  ctx.fillStyle = 'rgba(255,255,255,0.025)';
  for (let i = 0; i < 600; i++) {
    const x = Math.random() * W;
    const y = Math.random() * H;
    ctx.fillRect(x, y, 2, 2);
  }

  // 3. 상단 - 프로덕트 라벨
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.font = '500 32px "DM Mono", monospace';
  ctx.textAlign = 'center';
  ctx.fillText('SUKCHWI · BEOLNAMU · RELAY', W / 2, 180);

  // 4. 메인 타이틀 (Cormorant Garamond - serif)
  ctx.fillStyle = '#ffffff';
  ctx.font = 'italic 600 110px "Cormorant Garamond", serif';
  ctx.textAlign = 'center';
  ctx.fillText('Beolnamu', W / 2, 360);
  ctx.font = '600 110px "Cormorant Garamond", serif';
  ctx.fillText('Relay', W / 2, 490);

  // 5. 디바이더
  ctx.strokeStyle = 'rgba(255,255,255,0.4)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(W / 2 - 80, 580);
  ctx.lineTo(W / 2 + 80, 580);
  ctx.stroke();

  // 6. 카드 배경 (반투명 흰색)
  const cardX = 90, cardY = 700, cardW = W - 180, cardH = 800;
  ctx.fillStyle = 'rgba(255,255,255,0.96)';
  drawRoundRect(ctx, cardX, cardY, cardW, cardH, 32);
  ctx.fill();

  // 7. 카드 안 - 라벨
  ctx.fillStyle = '#7a7868';
  ctx.font = '500 28px "DM Mono", monospace';
  ctx.textAlign = 'center';
  ctx.fillText('TODAY · 나를 살린 사람', W / 2, cardY + 90);

  // 8. 카드 안 - 추천한 사람 이름
  const referredBy = (() => {
    // 내 신청자 정보 → 누가 추천했는지
    const all = DataStore.getAllApplicants();
    const me = all.find(a => a.code === myCode);
    return me?.referredByName || '운명';
  })();

  ctx.fillStyle = '#2d6a3f';
  ctx.font = 'italic 600 86px "Cormorant Garamond", serif';
  ctx.fillText(referredBy + '님', W / 2, cardY + 200);

  // 9. 디바이더
  ctx.strokeStyle = '#e0ddd4';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(cardX + 80, cardY + 290);
  ctx.lineTo(cardX + cardW - 80, cardY + 290);
  ctx.stroke();

  // 10. 카드 안 - 라벨 2
  ctx.fillStyle = '#7a7868';
  ctx.font = '500 28px "DM Mono", monospace';
  ctx.fillText('NEXT · 내가 살릴 사람', W / 2, cardY + 380);

  // 11. 내가 살린 사람 수
  const myCount = DataStore.getReferralCount(myCode);
  ctx.fillStyle = '#2d6a3f';
  if (myCount === 0) {
    ctx.font = 'italic 600 70px "Cormorant Garamond", serif';
    ctx.fillStyle = '#c0402a';
    ctx.fillText('아직 없음', W / 2, cardY + 480);
  } else {
    ctx.font = '600 110px "Cormorant Garamond", serif';
    ctx.fillText(myCount + ' 명', W / 2, cardY + 500);
  }

  // 12. 카드 하단 - 내 이름
  ctx.fillStyle = '#3a3a2e';
  ctx.font = '500 36px "Noto Sans KR", sans-serif';
  ctx.fillText('— ' + myName, W / 2, cardY + 660);

  // 13. 카드 하단 - 메시지
  ctx.fillStyle = '#7a7868';
  ctx.font = '400 30px "Noto Sans KR", sans-serif';
  ctx.fillText('이걸 받은 당신도', W / 2, cardY + 720);
  ctx.fillText('다음 한 명을 살려주세요', W / 2, cardY + 760);

  // 14. 하단 - 카운터 정보
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.font = '500 30px "DM Mono", monospace';
  const stats = DataStore.getStats();
  ctx.fillText(`지금 ${stats.total}명이 이어가는 중`, W / 2, H - 180);

  // 15. 하단 - URL
  ctx.fillStyle = '#ffffff';
  ctx.font = '700 36px "DM Mono", monospace';
  const shortLink = myLink.replace(/^https?:\/\//, '');
  ctx.fillText(shortLink, W / 2, H - 110);
}

function drawRoundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// 폰트 로드 후 그리기
document.fonts.ready.then(() => {
  drawStoryImage();
});
// 즉시 한번 그려서 빈 캔버스 방지
drawStoryImage();

// 새로고침
document.getElementById('btnRefreshImg').addEventListener('click', () => {
  drawStoryImage();
  toast('이미지를 새로 그렸어요');
});

// 다운로드
document.getElementById('btnDownloadImg').addEventListener('click', () => {
  canvas.toBlob((blob) => {
    if (!blob) { toast('이미지 생성 실패'); return; }
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `벌나무릴레이_${myName}_${Date.now()}.png`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    toast('이미지가 저장됐어요. 인스타에 올려주세요!');
  }, 'image/png');
});
</script>
